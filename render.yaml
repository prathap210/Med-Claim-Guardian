services:
  - type: web
    name: med-claim-guardian-api
    env: python
    region: oregon
    plan: free
    buildCommand: pip install --upgrade pip && pip install --prefer-binary --retries 5 --timeout 120 -r requirements.txt
    startCommand: uvicorn claim_denial_api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: PORT
        value: 10000
      - key: FRONTEND_URL
        sync: false   # Set this in Render dashboard to your Vercel URL
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: ADMIN_API_KEY
        generateValue: true
